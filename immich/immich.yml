apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data
  namespace: immich
spec:
  storageClassName: local-path-provisioner-hdd
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich
  namespace: immich
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: immich
  template:
    metadata:
      labels:
        app.kubernetes.io/name: immich
    spec:
      containers:
        - name: immich
          image: ghcr.io/immich-app/immich-server:v3.0.2
          env:
            - name: IMMICH_PORT
              value: "2283"
            - name: REDIS_PORT
              value: "6379"
          envFrom:
            - secretRef:
                name: env
            - configMapRef:
                name: env
          volumeMounts:
            - mountPath: /data
              name: data
          resources:
            requests:
              memory: 512Mi
              cpu: 25m
            limits:
              memory: 4Gi
              cpu: 1000m
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data
---
apiVersion: v1
kind: Service
metadata:
  name: immich
  namespace: immich
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: immich
  ports:
    - port: 2283
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: immich
  namespace: immich
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Immich
    gethomepage.dev/icon: immich
    gethomepage.dev/group: WAN

spec:
  hostnames:
    - immich.secondhomelab.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: eg
      namespace: envoy-gateway-system
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: immich
          port: 2283
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
