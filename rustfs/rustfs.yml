apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rustfs
  namespace: rustfs
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustfs
  namespace: rustfs
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: rustfs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rustfs
    spec:
      containers:
        - name: rustfs
          image: rustfs/rustfs:latest
          resources: {}
          env: []
          envFrom:
            - secretRef:
                name: env
          volumeMounts:
            - mountPath: /data
              name: data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rustfs

---
apiVersion: v1
kind: Service
metadata:
  name: rustfs
  namespace: rustfs
spec:
  ports:
    - name: s3
      port: 9000
    - name: ui
      port: 9001
  selector:
    app.kubernetes.io/name: rustfs
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: console
  namespace: rustfs
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: RustFS
    gethomepage.dev/icon: rustfs
    gethomepage.dev/group: WAN
spec:
  hostnames:
    - rustfs.secondhomelab.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: eg
      namespace: envoy-gateway-system
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: rustfs
          port: 9001
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: s3
  namespace: rustfs
spec:
  hostnames:
    - s3.secondhomelab.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: eg
      namespace: envoy-gateway-system
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: rustfs
          port: 9000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
