apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
data:
  kubernetes.yaml: |
    mode: cluster
    gateway: true

  settings.yaml: |
    disableIndexing: true

  services.yaml: |
    - Tailnet:
      - Proxmox:
          href: http://100.110.209.113:8006
          icon: proxmox
      - Argo-CD:
          href: http://100.108.113.103:30080
          icon: argo-cd

  widgets.yaml: |
    - greeting:
        text_size: 2xl
        text: Welcome to Second Home(lab)

  docker.yaml: ""
  bookmarks.yaml: |
    - Links:
      - GitHub:
          - icon: github
            href: https://github.com/secondhomelab
            description: Second Homelab GitHub Organization
      - Discord:
          - icon: discord
            href: https://discord.com/channels/1516025097746514041/1516650697507078295
            description: Second Homelab Discord server

  custom.css: ""
  custom.js: ""
