apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
data:
  kubernetes.yaml: |
    mode: cluster
    gateway: true

  settings.yaml: ""
  services.yaml: ""

  widgets.yaml: |
    - greeting:
        text_size: 4xl
        text: Welcome to Second Home(lab)

  docker.yaml: ""
  bookmarks.yaml: |
    - GitHub:
      - secondhomelab:
          - icon: github
            href: https://github.com/secondhomelab

  custom.css: ""
  custom.js: ""
