apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatus
  namespace: monitoring
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: gatus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gatus
    spec:
      serviceAccountName: gatus-sidecar
      containers:
        - name: gatus
          image: twinproduction/gatus:v5.36.0
          env:
            - name: GATUS_CONFIG_PATH
              value: /config
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /config/config.yaml
              name: config-source
              subPath: config.yaml
          resources:
            requests:
              cpu: 1m
              memory: 10Mi
            limits:
              cpu: 100m
              memory: 256Mi
        - name: gatus-sidecar
          image: ghcr.io/home-operations/gatus-sidecar:0.3.2
          args:
            - --auto-httproute
            - --output=/config/config-sidecar.yaml
          volumeMounts:
            - mountPath: /config
              name: config
          resources:
            requests:
              cpu: 1m
              memory: 10Mi
            limits:
              cpu: 100m
              memory: 256Mi

      volumes:
        - name: config
          emptyDir: {}
        - name: config-source
          configMap:
            name: gatus-config

---
apiVersion: v1
kind: Service
metadata:
  name: gatus
  namespace: monitoring
spec:
  ports:
    - port: 8080
  selector:
    app.kubernetes.io/name: gatus
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gatus
  namespace: monitoring
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Gatus
    gethomepage.dev/icon: gatus
    gethomepage.dev/group: WAN

spec:
  hostnames:
    - gatus.secondhomelab.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: eg
      namespace: envoy-gateway-system
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: gatus
          port: 8080
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
