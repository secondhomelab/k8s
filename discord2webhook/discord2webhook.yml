apiVersion: apps/v1
kind: Deployment
metadata:
  name: discord2webhook
  namespace: moreillon
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: discord2webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: discord2webhook
    spec:
      containers:
        - name: discord2webhook
          image: moreillon/discord2webhook:sha-fea5471
          resources:
            requests:
              memory: 128Mi
              cpu: 10m
            limits:
              memory: 256Mi
              cpu: 500m
          envFrom:
            - secretRef:
                name: discord2webhook-env
