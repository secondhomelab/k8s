apiVersion: apps/v1
kind: Deployment
metadata:
  name: secondhome-streamlit
  namespace: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: secondhome-streamlit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: secondhome-streamlit
    spec:
      containers:
        - name: secondhome-streamlit
          image: moreillon/secondhome-streamlit
---
apiVersion: v1
kind: Service
metadata:
  name: secondhome-streamlit
  namespace: test
spec:
  ports:
    - port: 8501
  selector:
    app.kubernetes.io/name: secondhome-streamlit
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: secondhome-streamlit
  namespace: test
spec:
  hostnames:
    - secondhome-streamlit.secondhomelab.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: eg
      namespace: envoy-gateway-system
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: secondhome-streamlit
          port: 8501
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
