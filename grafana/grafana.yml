apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: grafana
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:13.0.1
          resources:
            requests:
              memory: 256Mi
              cpu: 25m
            limits:
              memory: 1Gi
              cpu: 500m
          envFrom:
            - secretRef:
                name: env
          env:
            - name: GF_SERVER_ROOT_URL
              value: https://grafana.secondhomelab.com
            - name: GF_DATABASE_TYPE
              value: postgres

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: grafana
spec:
  ports:
    - port: 3000
  selector:
    app.kubernetes.io/name: grafana
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: grafana
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Grafana
    gethomepage.dev/icon: grafana
    gethomepage.dev/group: WAN

spec:
  hostnames:
    - grafana.secondhomelab.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: eg
      namespace: envoy-gateway-system
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: grafana
          port: 3000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
