apiVersion: v1
kind: ConfigMap
metadata:
  name: index
  namespace: index
data:
  index.html: |
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Second HomeLab</title>
        <style>
          body {
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
          }

          .logo {
            max-width: 500px;
            width: 100%;
          }
        </style>
      </head>
      <body>
        <img class="logo" src="https://avatars.githubusercontent.com/u/290229801" />
      </body>
    </html>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: index
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx
    spec:
      containers:
        - name: nginx
          image: nginx
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: html
          configMap:
            name: index
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: index
spec:
  ports:
    - port: 80
  selector:
    app.kubernetes.io/name: nginx
  type: ClusterIP

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx
  namespace: index
  annotations:
    gethomepage.dev/enabled: "false"
    gethomepage.dev/name: Index
    gethomepage.dev/icon: nginx

spec:
  hostnames:
    - secondhomelab.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: eg
      namespace: envoy-gateway-system
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: nginx
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
