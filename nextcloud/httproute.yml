apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nextcloud
  namespace: nextcloud
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Nextcloud
    gethomepage.dev/icon: nextcloud
    gethomepage.dev/group: WAN

spec:
  hostnames:
    - nextcloud.secondhomelab.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: eg
      namespace: envoy-gateway-system
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: nextcloud
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
