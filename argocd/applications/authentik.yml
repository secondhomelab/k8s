apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  sources:
    - repoURL: docker.io/envoyproxy
      chart: gateway-helm
      targetRevision: 2026.5.3
      helm:
        valueFiles:
          - $values/authentik/values.yml
    - repoURL: https://github.com/secondhomelab/k8s.git
      targetRevision: HEAD
      path: authentik/manifests
      ref: values
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
