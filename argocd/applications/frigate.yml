project: default
source:
  repoURL: https://github.com/secondhomelab/k8s.git
  path: frigate
  targetRevision: HEAD
destination:
  server: https://kubernetes.default.svc
  namespace: frigate
syncPolicy:
  automated:
    prune: false
    selfHeal: false
    enabled: true
  syncOptions:
    - CreateNamespace=true
